on:
  push: 
    branches: [main, master]
  workflow_dispatch: {}

name: deploy-shinylive-app

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            cran::shinylive@0.3.0
            local::.
      
      - name: Clean and Convert Shiny app to Shinylive
        shell: Rscript {0}
        run: |
          # Pulisci vecchia build
          if(dir.exists("_site")) unlink("_site", recursive = TRUE)
          # Esporta con verbose
          shinylive::export(".", "_site", verbose = TRUE)
      
      - uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"
          retention-days: 1
      
      - uses: actions/deploy-pages@v4
